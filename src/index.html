<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>Clock Widget</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    body {
      position: relative;
      font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
    }

    body.theme-classic {
      --widget-width: 256px;
      --widget-padding: 22px 28px 18px;
      --widget-radius: 20px;
      --widget-border: 0.5px solid rgba(255, 255, 255, 0.12);
      --widget-background: rgba(20, 20, 22, 0.62);
      --widget-shadow: none;
      --widget-backdrop: blur(18px) saturate(180%);
      --time-color: #ffffff;
      --seconds-color: rgba(255, 255, 255, 0.45);
      --meta-color: rgba(255, 255, 255, 0.4);
      --divider-color: rgba(255, 255, 255, 0.15);
      --tz-border: 0.5px solid rgba(255, 255, 255, 0.18);
      --tz-background: rgba(255, 255, 255, 0.1);
      --tz-color: rgba(255, 255, 255, 0.92);
      --tz-backdrop: blur(14px) saturate(180%);
    }

    body.theme-liquid-light {
      --widget-width: 264px;
      --widget-padding: 24px 28px 20px;
      --widget-radius: 26px;
      --widget-border: 1px solid rgba(255, 255, 255, 0.78);
      --widget-background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.34));
      --widget-shadow:
        0 18px 45px rgba(182, 196, 214, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
      --widget-backdrop: blur(28px) saturate(175%);
      --time-color: rgba(22, 35, 51, 0.98);
      --seconds-color: rgba(58, 73, 91, 0.72);
      --meta-color: rgba(64, 80, 99, 0.86);
      --divider-color: rgba(116, 130, 148, 0.28);
      --tz-border: 1px solid rgba(255, 255, 255, 0.88);
      --tz-background: rgba(255, 255, 255, 0.62);
      --tz-color: rgba(28, 42, 58, 0.98);
      --tz-backdrop: blur(18px) saturate(180%);
    }

    body.theme-minimal {
      --widget-width: 248px;
      --widget-padding: 8px 10px;
      --widget-radius: 0;
      --widget-border: 0 solid transparent;
      --widget-background: transparent;
      --widget-shadow: none;
      --widget-backdrop: blur(0px);
      --time-color: rgba(255, 255, 255, 0.98);
      --seconds-color: rgba(255, 255, 255, 0.72);
      --meta-color: rgba(255, 255, 255, 0.8);
      --divider-color: rgba(255, 255, 255, 0.2);
      --tz-border: 0 solid transparent;
      --tz-background: transparent;
      --tz-color: rgba(255, 255, 255, 0.9);
      --tz-backdrop: blur(0px);
    }

    .widget {
      position: absolute;
      left: 50%;
      top: 18px;
      transform: translateX(-50%);
      width: var(--widget-width);
      padding: var(--widget-padding);
      border-radius: var(--widget-radius);
      border: var(--widget-border);
      background: var(--widget-background);
      box-shadow: var(--widget-shadow);
      -webkit-backdrop-filter: var(--widget-backdrop);
      backdrop-filter: var(--widget-backdrop);
      cursor: grab;
    }

    .widget.pinned {
      cursor: default;
    }

    .widget:not(.pinned):active {
      cursor: grabbing;
    }

    .time {
      font-size: 58px;
      font-weight: 100;
      letter-spacing: -3px;
      color: var(--time-color);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
    }

    body.theme-liquid-light .time,
    body.theme-minimal .time {
      font-weight: 200;
      text-shadow: 0 2px 12px rgba(255, 255, 255, 0.18), 0 2px 8px rgba(0, 0, 0, 0.14);
    }

    .time .seconds {
      margin-left: 2px;
      font-size: 28px;
      font-weight: 200;
      color: var(--seconds-color);
      letter-spacing: -1px;
      vertical-align: super;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .ampm {
      font-size: 13px;
      font-weight: 400;
      color: var(--meta-color);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .divider {
      width: 1px;
      height: 12px;
      background: var(--divider-color);
    }

    .date {
      font-size: 13px;
      font-weight: 400;
      color: var(--meta-color);
      letter-spacing: 0.2px;
      white-space: nowrap;
    }

    .tz {
      margin-left: auto;
      max-width: 176px;
      padding: 5px 10px;
      border-radius: 10px;
      border: var(--tz-border);
      background: var(--tz-background);
      -webkit-backdrop-filter: var(--tz-backdrop);
      backdrop-filter: var(--tz-backdrop);
      font-size: 11px;
      font-weight: 600;
      color: var(--tz-color);
      letter-spacing: 0.15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }

    body.theme-liquid-light .tz,
    body.theme-minimal .tz {
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    body.theme-minimal .widget {
      top: 26px;
    }

    body.theme-minimal .meta {
      margin-top: 10px;
    }

    body.theme-minimal .time {
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.28);
    }

    body.theme-minimal .tz {
      padding: 0;
    }

    .ctx-menu {
      display: none;
      position: fixed;
      min-width: 196px;
      max-width: min(220px, calc(100vw - 20px));
      max-height: calc(100vh - 20px);
      padding: 6px;
      z-index: 9999;
      border-radius: 14px;
      border: 0.5px solid rgba(255, 255, 255, 0.14);
      background: rgba(35, 35, 38, 0.78);
      font-size: 13px;
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      backdrop-filter: blur(18px) saturate(180%);
      overflow-x: hidden;
      overflow-y: auto;
    }

    .ctx-menu.show {
      display: block;
    }

    .ctx-menu::-webkit-scrollbar {
      width: 10px;
    }

    .ctx-menu::-webkit-scrollbar-track {
      background: transparent;
      margin: 8px 0;
    }

    .ctx-menu::-webkit-scrollbar-thumb {
      border: 2px solid transparent;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0.16));
      background-clip: padding-box;
    }

    .ctx-menu::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0.22));
      background-clip: padding-box;
    }

    .ctx-item {
      padding: 8px 12px;
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.85);
      cursor: pointer;
      transition: background 0.1s;
    }

    .ctx-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .ctx-item.muted {
      color: rgba(255, 255, 255, 0.45);
      cursor: default;
    }

    .ctx-item.muted:hover {
      background: transparent;
    }

    .ctx-item.active {
      background: rgba(10, 132, 255, 0.22);
      color: rgba(255, 255, 255, 0.96);
    }

    .ctx-item.danger {
      color: #ff453a;
    }

    .ctx-menu .ctx-item:last-child {
      border-bottom-left-radius: 10px;
      border-bottom-right-radius: 10px;
    }

    #closeBtn {
      border-bottom-left-radius: 10px;
      border-bottom-right-radius: 10px;
    }

    .ctx-separator {
      height: 0.5px;
      margin: 4px 0;
      background: rgba(255, 255, 255, 0.1);
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.12);
      z-index: 10000;
    }

    .overlay.show {
      display: flex;
    }

    .panel {
      width: 320px;
      max-width: calc(100vw - 28px);
      max-height: calc(100vh - 28px);
      overflow: hidden;
      border-radius: 14px;
      border: 0.5px solid rgba(255, 255, 255, 0.14);
      background: rgba(28, 28, 30, 0.72);
      -webkit-backdrop-filter: blur(22px) saturate(180%);
      backdrop-filter: blur(22px) saturate(180%);
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 12px 10px;
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.12);
    }

    .panel-title {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.88);
      letter-spacing: 0.2px;
    }

    .panel-body {
      padding: 10px 8px 10px;
    }

    .search {
      width: 100%;
      padding: 9px 10px;
      border-radius: 10px;
      border: 0.5px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.9);
      outline: none;
      font-size: 13px;
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      backdrop-filter: blur(12px) saturate(180%);
    }

    .search::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .tz-list {
      margin-top: 10px;
      max-height: 320px;
      overflow: auto;
      padding: 4px;
      border-radius: 12px;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.03);
    }

    .tz-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.86);
      font-size: 13px;
    }

    .tz-item:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .tz-item.selected {
      background: rgba(10, 132, 255, 0.22);
    }

    .tz-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tz-offset {
      flex: 0 0 auto;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      white-space: nowrap;
    }

    .check {
      position: relative;
      flex: 0 0 10px;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      background: transparent;
    }

    .tz-item.selected .check::after {
      content: "";
      position: absolute;
      left: 2px;
      top: 1px;
      width: 5px;
      height: 8px;
      border-right: 2px solid rgba(255, 255, 255, 0.9);
      border-bottom: 2px solid rgba(255, 255, 255, 0.9);
      transform: rotate(40deg);
    }
  </style>
</head>
<body>
  <div class="widget" id="widget">
    <div class="time" id="time">
      12:00<span class="seconds" id="secs">:00</span>
    </div>
    <div class="meta">
      <span class="ampm" id="ampm">AM</span>
      <div class="divider"></div>
      <span class="date" id="date">Mon, Jan 1</span>
      <span class="tz" id="tzLabel" title="">UTC</span>
    </div>
  </div>

  <div class="ctx-menu" id="ctxMenu">
    <div class="ctx-item muted" id="currentTz">Time zone: -</div>
    <div class="ctx-item muted" id="windowModeState">Always on top: Off</div>
    <div class="ctx-separator"></div>
    <div class="ctx-item muted">Style</div>
    <div class="ctx-item" id="styleClassic">1. Classic dark</div>
    <div class="ctx-item" id="styleLiquidLight">2. Light theme</div>
    <div class="ctx-item" id="styleMinimal">3. Text only</div>
    <div class="ctx-separator"></div>
    <div class="ctx-item" id="addWidget">Add widget</div>
    <div class="ctx-item" id="togglePin">Pin widget: Off</div>
    <div class="ctx-item" id="toggleOnTop">Always on top: Off</div>
    <div class="ctx-item" id="openTz">Time zone...</div>
    <div class="ctx-item" id="toggleSeconds">Hide seconds</div>
    <div class="ctx-item" id="toggle24h">24h format</div>
    <div class="ctx-separator"></div>
    <div class="ctx-item danger" id="closeBtn">Close widget</div>
  </div>

  <div class="overlay" id="tzOverlay" aria-hidden="true">
    <div class="panel" role="dialog" aria-label="Time zone picker">
      <div class="panel-header">
        <div class="panel-title">Time Zone</div>
      </div>
      <div class="panel-body">
        <input class="search" id="tzSearch" placeholder="Search (e.g. Tbilisi, UTC, New_York)" autocomplete="off" />
        <div class="tz-list" id="tzList"></div>
      </div>
    </div>
  </div>

  <script>
    const { appWindow, LogicalSize, WebviewWindow } = window.__TAURI__.window;

    const WINDOW_WIDTH = 336;
    const WINDOW_HEIGHT = 296;

    const STORAGE_KEYS = {
      showSeconds: 'cw_showSeconds',
      use24h: 'cw_use24h',
      timeZone: 'cw_timeZone',
      alwaysOnTop: 'cw_alwaysOnTop',
      style: 'cw_style',
      pinned: 'cw_pinned',
    };

    const THEMES = {
      classic: 'theme-classic',
      liquidLight: 'theme-liquid-light',
      minimal: 'theme-minimal',
    };

    const FALLBACK_TIMEZONES = [
      'UTC',
      'Europe/London',
      'Europe/Paris',
      'Europe/Berlin',
      'Europe/Warsaw',
      'Europe/Kyiv',
      'Europe/Moscow',
      'Europe/Istanbul',
      'Europe/Tbilisi',
      'Asia/Dubai',
      'Asia/Kolkata',
      'Asia/Bangkok',
      'Asia/Singapore',
      'Asia/Tokyo',
      'Australia/Sydney',
      'Pacific/Auckland',
      'America/New_York',
      'America/Chicago',
      'America/Denver',
      'America/Los_Angeles',
      'America/Anchorage',
      'America/Sao_Paulo',
    ];

    const TIMEZONE_ALIASES = {
      tbilisi: 'Europe/Tbilisi',
      london: 'Europe/London',
      paris: 'Europe/Paris',
      berlin: 'Europe/Berlin',
      warsaw: 'Europe/Warsaw',
      kyiv: 'Europe/Kyiv',
      kiev: 'Europe/Kyiv',
      moscow: 'Europe/Moscow',
      istanbul: 'Europe/Istanbul',
      dubai: 'Asia/Dubai',
      kolkata: 'Asia/Kolkata',
      bangkok: 'Asia/Bangkok',
      singapore: 'Asia/Singapore',
      tokyo: 'Asia/Tokyo',
      sydney: 'Australia/Sydney',
      auckland: 'Pacific/Auckland',
      'new york': 'America/New_York',
      chicago: 'America/Chicago',
      denver: 'America/Denver',
      'los angeles': 'America/Los_Angeles',
      anchorage: 'America/Anchorage',
      'sao paulo': 'America/Sao_Paulo',
      'sao-paulo': 'America/Sao_Paulo',
      utc: 'UTC',
    };

    const widget = document.getElementById('widget');
    const ctxMenu = document.getElementById('ctxMenu');
    const tzOverlay = document.getElementById('tzOverlay');
    const tzSearch = document.getElementById('tzSearch');
    const tzList = document.getElementById('tzList');
    let filteredZones = [];
    const windowKeyPrefix = `${appWindow.label}_`;

    function loadBool(key, fallback) {
      const value = localStorage.getItem(windowKeyPrefix + key);
      if (value === null) return fallback;
      return value === 'true';
    }

    function saveBool(key, value) {
      localStorage.setItem(windowKeyPrefix + key, value ? 'true' : 'false');
    }

    function loadString(key, fallback) {
      const value = localStorage.getItem(windowKeyPrefix + key);
      return value === null ? fallback : value;
    }

    function saveString(key, value) {
      localStorage.setItem(windowKeyPrefix + key, value);
    }

    function safeResolvedTimeZone() {
      try {
        return Intl.DateTimeFormat().resolvedOptions().timeZone || null;
      } catch (_) {
        return null;
      }
    }

    function uniqueTimeZones(list) {
      const seen = new Set();
      const output = [];
      for (const tz of list) {
        if (!tz || typeof tz !== 'string' || seen.has(tz)) continue;
        seen.add(tz);
        output.push(tz);
      }
      return output;
    }

    function getTimeZones() {
      try {
        if (typeof Intl.supportedValuesOf === 'function') {
          return uniqueTimeZones(Intl.supportedValuesOf('timeZone'));
        }
      } catch (_) {
      }

      const localTz = safeResolvedTimeZone();
      return uniqueTimeZones([localTz, ...FALLBACK_TIMEZONES].filter(Boolean));
    }

    function getTimeZoneNameShort(timeZone, now) {
      try {
        const parts = new Intl.DateTimeFormat('en-US', {
          timeZone,
          timeZoneName: 'short',
        }).formatToParts(now);
        return parts.find((part) => part.type === 'timeZoneName')?.value || null;
      } catch (_) {
        return null;
      }
    }

    function shortTimeZoneLabel(tz) {
      if (!tz) return '-';
      if (tz === 'UTC') return 'UTC';
      return (tz.split('/').pop() || tz).replaceAll('_', ' ');
    }

    function fullTimeZoneLabel(tz) {
      if (!tz) return '-';
      if (tz === 'UTC') return 'UTC';
      return tz
        .split('/')
        .slice(1)
        .join(' / ')
        .replaceAll('_', ' ');
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    let showSeconds = loadBool(STORAGE_KEYS.showSeconds, true);
    let use24h = loadBool(STORAGE_KEYS.use24h, false);
    let alwaysOnTop = loadBool(STORAGE_KEYS.alwaysOnTop, false);
    let pinned = loadBool(STORAGE_KEYS.pinned, false);
    let timeZone = loadString(STORAGE_KEYS.timeZone, safeResolvedTimeZone() || 'UTC');
    let widgetStyle = loadString(STORAGE_KEYS.style, 'classic');
    let sizeSyncScheduled = false;

    function applyTheme() {
      const themeClass = THEMES[widgetStyle] || THEMES.classic;
      document.body.classList.remove(...Object.values(THEMES));
      document.body.classList.add(themeClass);
    }

    function setWidgetStyle(nextStyle) {
      if (!THEMES[nextStyle]) return;
      widgetStyle = nextStyle;
      saveString(STORAGE_KEYS.style, nextStyle);
      applyTheme();
      refreshMenuLabels();
    }

    async function applyWindowMode() {
      try {
        await appWindow.setAlwaysOnTop(alwaysOnTop);
        refreshMenuLabels();
      } catch (error) {
        console.error('Failed to update always-on-top mode', error);
      }
    }

    function refreshMenuLabels() {
      document.getElementById('toggleSeconds').textContent = showSeconds ? 'Hide seconds' : 'Show seconds';
      document.getElementById('toggle24h').textContent = use24h ? '12h format' : '24h format';
      document.getElementById('toggleOnTop').textContent = alwaysOnTop ? 'Always on top: On' : 'Always on top: Off';
      document.getElementById('windowModeState').textContent = alwaysOnTop ? 'Always on top: On' : 'Always on top: Off';
      document.getElementById('togglePin').textContent = pinned ? 'Pin widget: On' : 'Pin widget: Off';
      widget.classList.toggle('pinned', pinned);
      document.getElementById('styleClassic').classList.toggle('active', widgetStyle === 'classic');
      document.getElementById('styleLiquidLight').classList.toggle('active', widgetStyle === 'liquidLight');
      document.getElementById('styleMinimal').classList.toggle('active', widgetStyle === 'minimal');
    }

    function normalizeQuery(value) {
      return value.toLowerCase().replaceAll('_', ' ').replaceAll('/', ' ').trim();
    }

    function matchesTimeZone(query, tz) {
      if (!query) return true;
      const normalizedTz = normalizeQuery(tz);
      const city = normalizeQuery(shortTimeZoneLabel(tz));
      if (normalizedTz.includes(query) || city.includes(query)) {
        return true;
      }

      for (const [alias, aliasTz] of Object.entries(TIMEZONE_ALIASES)) {
        if (aliasTz !== tz) continue;
        if (alias.includes(query)) return true;
      }

      return false;
    }

    function updateClock() {
      const now = new Date();
      const hourOption = use24h ? '2-digit' : 'numeric';
      let timeParts = {};

      try {
        const formatter = new Intl.DateTimeFormat('en-US', {
          timeZone,
          hour: hourOption,
          minute: '2-digit',
          second: '2-digit',
          hour12: !use24h,
        });

        for (const part of formatter.formatToParts(now)) {
          if (part.type === 'literal') continue;
          timeParts[part.type] = part.value;
        }
      } catch (_) {
        timeParts = { hour: '--', minute: '--', second: '--', dayPeriod: '' };
      }

      document.getElementById('time').childNodes[0].textContent = `${timeParts.hour}:${timeParts.minute}`;
      document.getElementById('secs').textContent = `:${timeParts.second}`;
      document.getElementById('secs').style.display = showSeconds ? 'inline' : 'none';
      document.getElementById('ampm').style.display = use24h ? 'none' : 'inline';
      document.getElementById('ampm').textContent = timeParts.dayPeriod || '';

      try {
        document.getElementById('date').textContent = new Intl.DateTimeFormat('en-US', {
          timeZone,
          weekday: 'short',
          month: 'short',
          day: 'numeric',
        }).format(now);
      } catch (_) {
        document.getElementById('date').textContent = '-';
      }

      const tzOffset = getTimeZoneNameShort(timeZone, now);
      const tzLabel = document.getElementById('tzLabel');
      tzLabel.textContent = fullTimeZoneLabel(timeZone);
      tzLabel.title = timeZone;
      document.getElementById('currentTz').textContent = `Time zone: ${timeZone}${tzOffset ? ` (${tzOffset})` : ''}`;
    }

    function openTzPicker() {
      ctxMenu.classList.remove('show');
      tzOverlay.classList.add('show');
      tzOverlay.setAttribute('aria-hidden', 'false');
      tzSearch.value = '';
      renderTzList();
      setTimeout(() => tzSearch.focus(), 0);
    }

    function closeTzPicker() {
      tzOverlay.classList.remove('show');
      tzOverlay.setAttribute('aria-hidden', 'true');
    }

    async function syncWindowSize() {
      try {
        await appWindow.setSize(new LogicalSize(WINDOW_WIDTH, WINDOW_HEIGHT));
      } catch (error) {
        console.error('Failed to sync window size', error);
      }
    }

    function scheduleWindowSizeSync() {
      if (sizeSyncScheduled) return;
      sizeSyncScheduled = true;

      requestAnimationFrame(async () => {
        sizeSyncScheduled = false;
        await syncWindowSize();
      });
    }

    function showContextMenu() {
      const widgetRect = widget.getBoundingClientRect();
      ctxMenu.classList.add('show');
      ctxMenu.style.visibility = 'hidden';
      ctxMenu.style.left = '0px';
      ctxMenu.style.top = '0px';

      const menuRect = ctxMenu.getBoundingClientRect();
      const left = widgetRect.left + (widgetRect.width - menuRect.width) / 2;
      const gap = 10;
      const spaceAbove = widgetRect.top - gap;
      const spaceBelow = window.innerHeight - widgetRect.bottom - gap;
      const prefersBelow = spaceBelow >= menuRect.height || spaceBelow > spaceAbove;
      const top = prefersBelow
        ? widgetRect.bottom + gap
        : widgetRect.top - menuRect.height - gap;

      ctxMenu.scrollTop = 0;
      ctxMenu.style.left = `${clamp(left, 10, window.innerWidth - menuRect.width - 10)}px`;
      ctxMenu.style.top = `${clamp(top, 10, window.innerHeight - menuRect.height - 10)}px`;
      ctxMenu.style.visibility = '';
    }

    function setTimeZone(nextTimeZone) {
      timeZone = nextTimeZone;
      saveString(STORAGE_KEYS.timeZone, nextTimeZone);
      updateClock();
      renderTzList();
      tzSearch.value = fullTimeZoneLabel(nextTimeZone);
    }

    function renderTzList() {
      const query = normalizeQuery(tzSearch.value);
      const now = new Date();
      const zones = getTimeZones().filter((tz) => matchesTimeZone(query, tz));
      filteredZones = zones;

      tzList.innerHTML = '';
      for (const tz of zones.slice(0, 500)) {
        const item = document.createElement('div');
        item.className = `tz-item${tz === timeZone ? ' selected' : ''}`;
        item.setAttribute('data-tz', tz);

        const check = document.createElement('div');
        check.className = 'check';

        const name = document.createElement('div');
        name.className = 'tz-name';
        name.textContent = tz;
        name.title = tz;

        const offset = document.createElement('div');
        offset.className = 'tz-offset';
        offset.textContent = getTimeZoneNameShort(tz, now) || '';

        item.appendChild(check);
        item.appendChild(name);
        item.appendChild(offset);
        tzList.appendChild(item);
      }
    }

    document.addEventListener('contextmenu', (event) => {
      event.preventDefault();
      if (tzOverlay.classList.contains('show')) return;
      showContextMenu();
    });

    ctxMenu.addEventListener('mousedown', (event) => {
      event.stopPropagation();
    });

    ctxMenu.addEventListener('click', (event) => {
      event.stopPropagation();
    });

    document.addEventListener('click', (event) => {
      if (event.target.closest('#ctxMenu')) return;
      ctxMenu.classList.remove('show');
    });

    function bindMenuAction(elementId, handler) {
      document.getElementById(elementId).addEventListener('click', async (event) => {
        event.stopPropagation();
        ctxMenu.classList.remove('show');
        await handler(event);
      });
    }

    bindMenuAction('addWidget', async () => {
      try {
        const position = await appWindow.outerPosition();
        const label = `widget-${Date.now()}`;

        new WebviewWindow(label, {
          url: 'index.html',
          title: 'Clock Widget',
          width: WINDOW_WIDTH,
          height: WINDOW_HEIGHT,
          resizable: false,
          fullscreen: false,
          decorations: false,
          transparent: true,
          alwaysOnTop: false,
          skipTaskbar: true,
          focus: true,
          x: position.x + 28,
          y: position.y + 28,
        });
      } catch (error) {
        console.error('Failed to create widget', error);
      }
    });

    bindMenuAction('togglePin', async () => {
      pinned = !pinned;
      saveBool(STORAGE_KEYS.pinned, pinned);
      refreshMenuLabels();
    });

    widget.addEventListener('mousedown', async (event) => {
      if (pinned || event.button !== 0) return;
      if (event.target.closest('#tzLabel')) return;
      try {
        await appWindow.setFocus();
        await appWindow.startDragging();
      } catch (error) {
        console.error('Failed to start dragging from widget', error);
      }
    });

    bindMenuAction('toggleOnTop', async () => {
      alwaysOnTop = !alwaysOnTop;
      saveBool(STORAGE_KEYS.alwaysOnTop, alwaysOnTop);
      refreshMenuLabels();
      await applyWindowMode();
    });

    bindMenuAction('toggleSeconds', async () => {
      showSeconds = !showSeconds;
      saveBool(STORAGE_KEYS.showSeconds, showSeconds);
      refreshMenuLabels();
      updateClock();
    });

    bindMenuAction('toggle24h', async () => {
      use24h = !use24h;
      saveBool(STORAGE_KEYS.use24h, use24h);
      refreshMenuLabels();
      updateClock();
    });

    bindMenuAction('styleClassic', async () => {
      setWidgetStyle('classic');
    });

    bindMenuAction('styleLiquidLight', async () => {
      setWidgetStyle('liquidLight');
    });

    bindMenuAction('styleMinimal', async () => {
      setWidgetStyle('minimal');
    });

    bindMenuAction('closeBtn', async () => {
      try {
        await appWindow.close();
      } catch (error) {
        console.error('Failed to close widget', error);
      }
    });

    bindMenuAction('openTz', async () => {
      openTzPicker();
    });
    document.getElementById('tzLabel').addEventListener('click', (event) => {
      event.stopPropagation();
      openTzPicker();
    });

    tzSearch.addEventListener('input', renderTzList);

    tzSearch.addEventListener('keydown', (event) => {
      if (event.key !== 'Enter') return;
      const exactAlias = TIMEZONE_ALIASES[normalizeQuery(tzSearch.value)];
      const nextTimeZone = exactAlias || filteredZones[0];
      if (!nextTimeZone) return;
      setTimeZone(nextTimeZone);
      closeTzPicker();
    });

    tzList.addEventListener('click', (event) => {
      const row = event.target.closest('.tz-item');
      if (!row) return;
      const tz = row.getAttribute('data-tz');
      if (tz) setTimeZone(tz);
      closeTzPicker();
    });

    tzOverlay.addEventListener('mousedown', (event) => {
      if (event.target === tzOverlay) closeTzPicker();
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        closeTzPicker();
        ctxMenu.classList.remove('show');
      }
    });

    window.addEventListener('resize', () => {
      ctxMenu.classList.remove('show');
      scheduleWindowSizeSync();
    });

    applyTheme();
    refreshMenuLabels();
    scheduleWindowSizeSync();
    applyWindowMode();
    updateClock();
    renderTzList();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
