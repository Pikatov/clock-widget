<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>Clock Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="widget" id="widget">
    <div class="time" id="time">
      12:00<span class="seconds" id="secs">:00</span>
    </div>
    <div class="meta">
      <span class="ampm" id="ampm">AM</span>
      <div class="divider"></div>
      <span class="date" id="date">Mon, Jan 1</span>
      <span class="tz" id="tzLabel" title="">UTC</span>
    </div>
  </div>

  <div class="ctx-menu" id="ctxMenu">
    <div class="ctx-item muted" id="currentTz">Time zone: -</div>
    <div class="ctx-item muted" id="windowModeState">Always on top: Off</div>
    <div class="ctx-separator"></div>
    <div class="ctx-item muted">Style</div>
    <div class="ctx-item" id="styleClassic">1. Classic dark</div>
    <div class="ctx-item" id="styleLiquidLight">2. Light theme</div>
    <div class="ctx-item" id="styleMinimal">3. Text only</div>
    <div class="ctx-separator"></div>
    <div class="ctx-item" id="addWidget">Add widget</div>
    <div class="ctx-item" id="togglePin">Pin widget: Off</div>
    <div class="ctx-item" id="toggleOnTop">Always on top: Off</div>
    <div class="ctx-item" id="openTz">Time zone...</div>
    <div class="ctx-item" id="toggleSeconds">Hide seconds</div>
    <div class="ctx-item" id="toggle24h">24h format</div>
    <div class="ctx-separator"></div>
    <div class="ctx-item danger" id="closeBtn">Close widget</div>
  </div>

  <div class="overlay" id="tzOverlay" aria-hidden="true">
    <div class="panel" role="dialog" aria-label="Time zone picker">
      <div class="panel-header">
        <div class="panel-title">Time Zone</div>
      </div>
      <div class="panel-body">
        <input class="search" id="tzSearch" placeholder="Search (e.g. Tbilisi, UTC, New_York)" autocomplete="off" />
        <div class="tz-list" id="tzList"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
