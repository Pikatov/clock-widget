name: Release assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows assets
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        shell: pwsh
        run: rustup toolchain install stable --profile minimal

      - name: Use Rust stable
        shell: pwsh
        run: rustup default stable

      - name: Install WiX Toolset
        shell: pwsh
        run: choco install wixtoolset --no-progress -y

      - name: Add WiX to PATH
        shell: pwsh
        run: echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" >> $env:GITHUB_PATH

      - name: Install Tauri CLI
        shell: pwsh
        run: cargo install tauri-cli --version "^1" --locked

      - name: Build release assets
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build-release-assets.ps1

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clock-widget-windows-assets
          path: dist/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          if (gh release view $tag 2>$null) {
            gh release upload $tag dist\* --clobber
          } else {
            gh release create $tag dist\* --title "Clock Widget $tag" --notes-file RELEASE_NOTES.md --verify-tag
          }
